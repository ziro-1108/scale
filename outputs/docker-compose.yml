services:
  mysql:
    image: mysql:8.4
    container_name: scale-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: scale
      MYSQL_USER: scale_user
      MYSQL_PASSWORD: scale_password
      MYSQL_ROOT_PASSWORD: scale_root_password
      TZ: Asia/Seoul
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uscale_user -pscale_password --silent"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./backend
    container_name: scale-api
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      APP_NAME: SCALE
      DATABASE_URL: mysql+pymysql://scale_user:scale_password@mysql:3306/scale?charset=utf8mb4
      API_CORS_ORIGINS: http://localhost:8080,http://127.0.0.1:8080,http://localhost:5173,http://127.0.0.1:5173
      STORAGE_DIR: /app/storage
      MEASUREMENT_RESULT_URL: http://measurement-server.local/tasks/{task_id}
      MEASUREMENT_IMAGE_URL: http://measurement-server.local/tasks/{task_id}/image
      WORKER_POLL_INTERVAL_SECONDS: 3
      WORKER_BATCH_SIZE: 50
      WORKER_CONCURRENCY: 10
      TZ: Asia/Seoul
    ports:
      - "8000:8000"
    volumes:
      - scale_storage:/app/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 10

  worker:
    build:
      context: ./backend
    container_name: scale-worker
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      api:
        condition: service_healthy
    environment:
      APP_NAME: SCALE
      DATABASE_URL: mysql+pymysql://scale_user:scale_password@mysql:3306/scale?charset=utf8mb4
      STORAGE_DIR: /app/storage
      MEASUREMENT_RESULT_URL: http://measurement-server.local/tasks/{task_id}
      MEASUREMENT_IMAGE_URL: http://measurement-server.local/tasks/{task_id}/image
      WORKER_POLL_INTERVAL_SECONDS: 3
      WORKER_BATCH_SIZE: 50
      WORKER_CONCURRENCY: 10
      TZ: Asia/Seoul
    command: ["python", "-m", "worker.poller"]
    volumes:
      - scale_storage:/app/storage

  frontend:
    build:
      context: ./frontend
    container_name: scale-frontend
    restart: unless-stopped
    depends_on:
      api:
        condition: service_started
    ports:
      - "8080:80"

volumes:
  mysql_data:
  scale_storage:
